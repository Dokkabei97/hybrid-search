spring:
  application:
    name: hybrid-search
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    connection-timeout: 3s
    socket-timeout: 10s
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:embeddinggemma}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        collection-name: ${QDRANT_COLLECTION:products}
        use-tls: false
        initialize-schema: true

search:
  index-name: products
  index-template-name: products-template
  classifier:
    # 공격적 KEYWORD 라우팅(임베딩/벡터 비용 최소화)
    max-keyword-tokens: 5          # 이 이하면 조사 있어도 KEYWORD
    noun-ratio-threshold: 0.5      # 명사 비율이 이 이상이면 KEYWORD
    max-particles-for-keyword: 2   # 조사+어미 합계가 이 초과 + 서술어 있을 때만 SENTENCE
  rrf:
    k: 60
  top-k:
    lexical: 50
    vector: 50
  embedding:
    dimension: 768                # EmbeddingGemma-300m 기본 (Matryoshka 512/256/128 축소 가능)
    max-chars: 1000               # Gemma context 2048 토큰 대응 — 한국어 여유 cap
    # 모델별 wrapping. 비우면 off — OpenAI v3, Gemini, Cohere, Voyage 등은 빈 문자열로 두고 API 파라미터가 처리.
    query-instruction: "task: search result | query: {query}"
    document-instruction: "title: {title} | text: {text}"
  fallback:
    lexical-on-vector-failure: true
  indexing:
    batch-size: 500
    concurrency: 4
    max-retries: 3
    initial-backoff-ms: 200
    max-backoff-ms: 5000

logging:
  level:
    com.hl.hybridsearch: DEBUG
    co.elastic.clients: INFO
